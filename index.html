<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/small.css">
    <link rel="stylesheet" href="css/medium.css">
    <link rel="stylesheet" href="css/large.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <span id="location"></span>
        <span id="settings"><img src="settings.svg" alt="settings"></span>
    </header>
    <main>
        <section id="weatherCard"></section>
        <aside>
            <p>Enter a valid 5-digit US zip code.</p>
            <input type="number" id="zip">
            <button id="applyZip">Set Zip Code</button>
            <button id="closeAside">Close</button>
        </aside>
    </main>
    <footer>Weather Assignment Ethan Perl</footer>
    <script src="js/scripts.js"></script>
</body>
</html>
